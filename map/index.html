<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Carte Irigo – Track’Irigo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../icon_site.png" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D5E1Y55M9G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-D5E1Y55M9G');
  </script>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
  />
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">

  <script src="https://unpkg.com/suncalc@1.8.0/suncalc.js"></script>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>
  <header class="top-bar">
    <div class="top-bar__brand">
      <a href="../" aria-label="Retour à l'accueil">
        <img src="../icon_site.png" alt="Logo Track’Irigo" class="top-bar__logo" />
      </a>
      <span class="top-bar__title">Track’Irigo</span>
    </div>
    <div class="top-bar__actions">
      <button
        id="locate_btn"
        class="top-bar__icon-btn"
        type="button"
        title="Me localiser"
        aria-label="Me localiser"
      >
        <i class="fas fa-location-crosshairs" aria-hidden="true"></i>
      </button>
      <button
        id="filter_toggle_btn"
        class="top-bar__icon-btn"
        type="button"
        title="Filtrer les lignes"
        aria-label="Filtrer les lignes"
        aria-haspopup="true"
        aria-expanded="false"
      >
        <i class="fas fa-sliders-h" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <div
    id="filter-panel"
    role="dialog"
    aria-labelledby="filter-panel-title"
    aria-hidden="true"
  >
    <strong id="filter-panel-title">Filtrer les lignes</strong>
    <div id="filter-list"></div>
  </div>

  <div id="loading-overlay">
    <div class="loading-panel">
      <div class="loading-spinner"></div>
      <div class="loading-text">Chargement en cours, veuillez patienter...</div>
    </div>
  </div>
  <div id="map"></div>
  <div id="vehicle-info-panel" class="is-empty">
    <div class="vehicle-info-placeholder"></div>
    <div class="vehicle-info-content" id="vehicle-info-panel-content">
      <div class="vehicle-info-header-row">
        <button type="button" class="vehicle-info-header" data-vehicle-info-toggle aria-expanded="true" aria-controls="vehicle-info-panel-content">
          <span class="vehicle-info-badge">Bus n°</span>
          <span class="vehicle-info-id" data-vehicle-field="id">-</span>
          <span class="vehicle-info-toggle-indicator" aria-hidden="true"></span>
        </button>
        <button type="button" class="vehicle-info-close" data-vehicle-info-close aria-label="Fermer le panneau" title="Fermer le panneau"></button>
      </div>
      <div class="vehicle-info-divider"></div>
      <div class="vehicle-info-row">
        <span class="vehicle-info-label">Ligne</span>
        <span class="vehicle-info-value" data-vehicle-field="line">-</span>
      </div>
      <div class="vehicle-info-row">
        <span class="vehicle-info-label">Destination</span>
        <span class="vehicle-info-value" data-vehicle-field="destination">-</span>
      </div>
      <div class="vehicle-info-row">
        <span class="vehicle-info-label">Prochain arrêt</span>
        <span class="vehicle-info-value" data-vehicle-field="next-stop">-</span>
      </div>
      <div class="vehicle-info-divider"></div>
      <div class="vehicle-timeline-container" data-vehicle-timeline-container>
        <div class="vehicle-timeline-header">
          <span class="vehicle-timeline-title">Prochains arrets</span>
          <button type="button" class="vehicle-timeline-toggle is-hidden" data-vehicle-timeline-toggle>Charger plus d'arrets</button>
        </div>
        <div class="vehicle-timeline-placeholder" data-vehicle-timeline-placeholder>Horaires indisponibles.</div>
        <div class="vehicle-timeline-steps" data-vehicle-field="timeline"></div>
      </div>
    </div>
  </div>
  <div id="update_timer"></div>
  <div id="track_hint">Cliquez sur un véhicule pour le suivre</div>
  <!-- SheetJS-->
  <script src="https://cdn.sheetjs.com/xlsx-0.19.0/package/xlsx.full.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
